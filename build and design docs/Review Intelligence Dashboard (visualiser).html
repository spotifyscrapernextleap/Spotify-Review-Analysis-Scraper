"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"0f61aa22-87bf-46fb-b17c-34a695beb902\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  <style>/* latin-ext */\n@font-face {\n  font-family: 'Sora';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"42d3d424-d7dd-4ffc-ba33-5dc96d89b9b1\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Sora';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"f6d01d1d-509a-4f19-9fec-f65df84f1bd2\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Sora';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"42d3d424-d7dd-4ffc-ba33-5dc96d89b9b1\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Sora';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"f6d01d1d-509a-4f19-9fec-f65df84f1bd2\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Sora';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"42d3d424-d7dd-4ffc-ba33-5dc96d89b9b1\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Sora';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"f6d01d1d-509a-4f19-9fec-f65df84f1bd2\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Sora';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"42d3d424-d7dd-4ffc-ba33-5dc96d89b9b1\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Sora';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"f6d01d1d-509a-4f19-9fec-f65df84f1bd2\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <script src=\"c4a500f6-531e-4c9a-a9e3-afbcdef96c73\"><\u002Fscript>\n  <style>\n    * { margin:0; padding:0; box-sizing:border-box; }\n    body { background:#0d1117; color:#c9d1d9; font-family:'Sora',system-ui,sans-serif; }\n    body::-webkit-scrollbar { width:7px; }\n    body::-webkit-scrollbar-track { background:#0d1117; }\n    body::-webkit-scrollbar-thumb { background:#21262d; border-radius:3px; }\n    @keyframes atlasReveal { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"display:flex;min-height:100vh\">\n\n  <!-- ============ SIDEBAR (V1 layout) ============ -->\n  <nav style=\"width:236px;background:#090c10;border-right:1px solid #21262d;position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:10\">\n    <div style=\"padding:28px 24px 20px\">\n      <div style=\"font-size:10px;font-weight:600;color:#1DB954;letter-spacing:2px;text-transform:uppercase\">Review Intelligence<\u002Fdiv>\n      <div style=\"font-size:11px;color:#484f58;margin-top:4px\">Spotify · Discovery Analysis<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"height:1px;background:#21262d;margin:0 16px\"><\u002Fdiv>\n    <div style=\"padding:12px 0;flex:1\">\n      <sc-for list=\"{{ navItems }}\" as=\"item\" hint-placeholder-count=\"4\">\n        <div onclick=\"{{ item.onClick }}\" style=\"padding:10px 24px;cursor:pointer;font-size:13px;font-weight:500;color:{{ item.color }};background:{{ item.bg }};border-left:3px solid {{ item.borderColor }};transition:all 0.12s\">{{ item.label }}<\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"padding:16px 24px;border-top:1px solid #21262d\">\n      <div style=\"font-size:10px;color:#484f58;text-transform:uppercase;letter-spacing:0.5px\">Prototype · Mock Data<\u002Fdiv>\n      <div style=\"font-size:10px;color:#30363d;margin-top:2px\">Dec 2025 – Jun 2026<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- ============ MAIN ============ -->\n  <main style=\"margin-left:236px;flex:1;padding:36px 48px 80px;max-width:1080px\">\n\n    <!-- ================= OVERVIEW ================= -->\n    <sc-if value=\"{{ showOverview }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"margin-bottom:28px\">\n        <div style=\"font-size:10px;font-weight:600;color:#484f58;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px\">Summary<\u002Fdiv>\n        <div style=\"font-size:24px;font-weight:700;color:#fff;letter-spacing:-0.02em\">The discovery problem is real, sized, and not the whole story<\u002Fdiv>\n        <div style=\"font-size:13px;color:#8b949e;margin-top:6px\">How large is discovery relative to everything else — and what users still love.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- HERO NUMBERS -->\n      <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:#21262d;border-radius:12px;overflow:hidden;margin-bottom:28px\">\n        <div style=\"background:#161b22;padding:24px;text-align:center\">\n          <div style=\"font-size:40px;font-weight:700;color:#fff;letter-spacing:-0.04em\">{{ discoveryPct }}<\u002Fdiv>\n          <div style=\"font-size:12px;color:#8b949e;margin-top:6px\">Discovery share of voice<\u002Fdiv>\n          <div style=\"font-size:10px;color:#484f58;margin-top:2px\">{{ discoveryCount }} of {{ substantiveCount }} substantive · 2nd largest<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#161b22;padding:24px;text-align:center\">\n          <div style=\"font-size:40px;font-weight:700;color:#f85149;letter-spacing:-0.04em\">−0.8★<\u002Fdiv>\n          <div style=\"font-size:12px;color:#8b949e;margin-top:6px\">Effect size on rating<\u002Fdiv>\n          <div style=\"font-size:10px;color:#484f58;margin-top:2px\">{{ effectCI }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#161b22;padding:24px;text-align:center\">\n          <div style=\"font-size:40px;font-weight:700;color:#1DB954;letter-spacing:-0.04em\">{{ delightShare }}<\u002Fdiv>\n          <div style=\"font-size:12px;color:#8b949e;margin-top:6px\">Reviewers are positive<\u002Fdiv>\n          <div style=\"font-size:10px;color:#484f58;margin-top:2px\">{{ delightCount }} reviews delighted<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- CAVEAT -->\n      <div style=\"background:rgba(29,185,84,0.06);border:1px solid rgba(29,185,84,0.15);border-radius:8px;padding:14px 20px;margin-bottom:40px;font-size:12px;color:#8b949e;line-height:1.6\">\n        <span style=\"color:#1DB954;font-weight:600\">Note:<\u002Fspan> These are unprompted mentions — users raised discovery without being asked. Chronic dissatisfaction is structurally undercounted in reviews. A modest share of voice does not mean a small problem.\n      <\u002Fdiv>\n\n      <!-- 1A: SHARE OF VOICE -->\n      <div style=\"margin-bottom:40px\">\n        <div style=\"font-size:14px;font-weight:600;color:#fff;margin-bottom:4px\">Share of voice by category<\u002Fdiv>\n        <div style=\"font-size:11px;color:#484f58;margin-bottom:16px\">Proportion of substantive reviews raising each category. Every percentage carries its raw count.<\u002Fdiv>\n        <sc-for list=\"{{ categories }}\" as=\"cat\" hint-placeholder-count=\"7\">\n          <div style=\"display:flex;align-items:center;gap:12px;padding:7px 0\">\n            <div style=\"width:180px;font-size:13px;color:{{ cat.nameColor }};font-weight:{{ cat.nameWeight }};white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ cat.name }}<\u002Fdiv>\n            <div style=\"flex:1;height:26px;background:#161b22;border-radius:6px;overflow:hidden\">\n              <div style=\"height:100%;border-radius:6px;width:{{ cat.barWidth }};background:{{ cat.barColor }};transition:width 0.5s\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"width:120px;text-align:right;font-size:12px;font-weight:600;color:{{ cat.pctColor }}\">{{ cat.pctLabel }}<\u002Fdiv>\n            <div style=\"width:36px;text-align:right;font-size:11px;color:#484f58\">{{ cat.ratingLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- 1A: RATING COMPARISON + CI -->\n      <div style=\"margin-bottom:40px\">\n        <div style=\"font-size:14px;font-weight:600;color:#fff;margin-bottom:16px\">Rating comparison — the headline effect size<\u002Fdiv>\n        <div style=\"background:#161b22;border-radius:10px;padding:24px;border:1px solid #21262d\">\n          <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:12px\">\n            <div style=\"width:120px;font-size:12px;color:#8b949e\">All reviews<\u002Fdiv>\n            <div style=\"flex:1;height:26px;background:#21262d;border-radius:4px;overflow:hidden\">\n              <div style=\"height:100%;background:#484f58;border-radius:4px;width:{{ baselineWidth }}\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:17px;font-weight:700;color:#c9d1d9;width:48px;text-align:right\">3.2★<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:14px\">\n            <div style=\"width:120px;font-size:12px;color:#8b949e\">Discovery reviews<\u002Fdiv>\n            <div style=\"flex:1;height:26px;background:#21262d;border-radius:4px;overflow:hidden\">\n              <div style=\"height:100%;background:#1DB954;border-radius:4px;width:{{ discoveryWidth }}\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:17px;font-weight:700;color:#1DB954;width:48px;text-align:right\">2.4★<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:16px;padding-top:14px;border-top:1px solid #21262d;display:flex;gap:14px;align-items:baseline\">\n            <div style=\"font-size:20px;font-weight:700;color:#f85149;letter-spacing:-0.02em\">−0.8 stars<\u002Fdiv>\n            <div style=\"font-size:12px;color:#8b949e\">{{ effectCI }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:12px;color:#484f58;margin-top:8px;line-height:1.5\">{{ effectNote }} Both groups are drawn from the same biased reviewer pool, so the gap is valid even though absolute ratings are not a population truth.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 1A: BASELINE HISTOGRAM + TREND -->\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:40px\">\n        <div>\n          <div style=\"font-size:14px;font-weight:600;color:#fff;margin-bottom:4px\">Rating distribution<\u002Fdiv>\n          <div style=\"font-size:11px;color:#484f58;margin-bottom:16px\">Baseline — all rated reviews, including contentless.<\u002Fdiv>\n          <div style=\"display:flex;align-items:flex-end;gap:10px;height:150px;padding:0 8px\">\n            <sc-for list=\"{{ ratingDist }}\" as=\"bar\" hint-placeholder-count=\"5\">\n              <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end\">\n                <div style=\"font-size:11px;color:#8b949e;font-weight:600\">{{ bar.pctLabel }}<\u002Fdiv>\n                <div style=\"width:100%;background:{{ bar.barColor }};border-radius:4px 4px 0 0;height:{{ bar.barHeight }};transition:height 0.5s;min-height:4px\"><\u002Fdiv>\n                <div style=\"font-size:11px;color:#8b949e\">{{ bar.label }}<\u002Fdiv>\n                <div style=\"font-size:10px;color:#484f58\">{{ bar.countLabel }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:14px;font-weight:600;color:#fff;margin-bottom:4px\">Discovery share of voice over time<\u002Fdiv>\n          <div style=\"font-size:11px;color:#484f58;margin-bottom:12px\">Direction: <span style=\"color:#d29922;font-weight:600\">{{ trendLabel }}<\u002Fspan> — {{ trendSummary }}<\u002Fdiv>\n          <svg viewBox=\"0 0 680 150\" style=\"width:100%;height:150px\" preserveAspectRatio=\"none\">\n            <polygon points=\"{{ trendAreaPoints }}\" fill=\"rgba(29,185,84,0.10)\"><\u002Fpolygon>\n            <polyline points=\"{{ trendLinePoints }}\" fill=\"none\" stroke=\"#1DB954\" stroke-width=\"2.5\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpolyline>\n            <sc-for list=\"{{ trendDots }}\" as=\"dot\" hint-placeholder-count=\"7\">\n              <circle cx=\"{{ dot.cx }}\" cy=\"{{ dot.cy }}\" r=\"3.5\" fill=\"#0d1117\" stroke=\"#1DB954\" stroke-width=\"2\"><\u002Fcircle>\n            <\u002Fsc-for>\n            <sc-for list=\"{{ trendLabels }}\" as=\"lab\" hint-placeholder-count=\"7\">\n              <text x=\"{{ lab.x }}\" y=\"144\" fill=\"#484f58\" font-size=\"11\" text-anchor=\"middle\" font-family=\"Sora\">{{ lab.label }}<\u002Ftext>\n            <\u002Fsc-for>\n          <\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 1B: DELIGHT COUNTERWEIGHT -->\n      <div style=\"border-top:1px solid #21262d;padding-top:32px;margin-bottom:40px\">\n        <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:4px\">\n          <div style=\"font-size:14px;font-weight:600;color:#fff\">The counterweight — what users love<\u002Fdiv>\n          <div style=\"font-size:9px;font-weight:600;color:#1DB954;background:rgba(29,185,84,0.1);padding:2px 8px;border-radius:3px;text-transform:uppercase;letter-spacing:0.4px\">Light pass<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:11px;color:#484f58;margin-bottom:18px\">Deliberately shallow — a counterweight, not a second investigation.<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1.1fr 1fr;gap:24px\">\n          <div>\n            <div style=\"font-size:12px;color:#8b949e;margin-bottom:12px\">Positive-sentiment share by category<\u002Fdiv>\n            <sc-for list=\"{{ delightByCategory }}\" as=\"dc\" hint-placeholder-count=\"6\">\n              <div style=\"display:flex;align-items:center;gap:12px;padding:5px 0\">\n                <div style=\"width:150px;font-size:12px;color:#8b949e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ dc.name }}<\u002Fdiv>\n                <div style=\"flex:1;height:18px;background:#161b22;border-radius:4px;overflow:hidden\">\n                  <div style=\"height:100%;border-radius:4px;width:{{ dc.barWidth }};background:#1DB954;opacity:0.7\"><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"width:36px;text-align:right;font-size:12px;font-weight:600;color:#c9d1d9\">{{ dc.pctLabel }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:12px;color:#8b949e;margin-bottom:12px\">Top delight themes<\u002Fdiv>\n            <sc-for list=\"{{ delightThemes }}\" as=\"t\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#161b22;border-radius:8px;margin-bottom:6px;border:1px solid #21262d\">\n                <div style=\"font-size:12px;color:#c9d1d9\">{{ t.name }}<\u002Fdiv>\n                <div style=\"font-size:12px;font-weight:600;color:#1DB954;flex-shrink:0;margin-left:12px\">{{ t.countLabel }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 1C: SENTIMENT IN CONTEXT -->\n      <div style=\"border-top:1px solid #21262d;padding-top:32px\">\n        <div style=\"font-size:14px;font-weight:600;color:#fff;margin-bottom:4px\">Discovery sentiment, in context<\u002Fdiv>\n        <div style=\"font-size:11px;color:#484f58;margin-bottom:18px\">Positive vs negative share within each category — is discovery <span style=\"color:#8b949e\">unusually<\u002Fspan> a problem, or do people grumble about everything? All six categories appear, so the engine is shown to classify everything, not just discovery.<\u002Fdiv>\n        <sc-for list=\"{{ sentimentSplit }}\" as=\"s\" hint-placeholder-count=\"6\">\n          <div style=\"display:flex;align-items:center;gap:12px;padding:6px 0\">\n            <div style=\"width:180px;font-size:13px;color:{{ s.nameColor }};font-weight:{{ s.nameWeight }};white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ s.name }}<\u002Fdiv>\n            <div style=\"flex:1;height:24px;border-radius:6px;overflow:hidden;display:flex\">\n              <div style=\"height:100%;width:{{ s.posWidth }};background:#1DB954;opacity:0.85;display:flex;align-items:center;justify-content:flex-start;padding-left:8px;font-size:10px;color:#04130a;font-weight:600\">{{ s.posLabel }}<\u002Fdiv>\n              <div style=\"height:100%;width:{{ s.negWidth }};background:#f85149;opacity:0.8;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:10px;color:#1a0303;font-weight:600\">{{ s.negLabel }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <div style=\"margin-top:18px;background:#161b22;border-radius:8px;padding:16px 20px;border:1px solid #21262d\">\n          <div style=\"font-size:12px;color:#8b949e;margin-bottom:10px\">Common themes inside the <span style=\"color:#1DB954\">positive<\u002Fspan> discovery reviews<\u002Fdiv>\n          <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n            <sc-for list=\"{{ positiveDiscoveryThemes }}\" as=\"pt\" hint-placeholder-count=\"3\">\n              <div style=\"font-size:12px;color:#c9d1d9;background:rgba(29,185,84,0.08);border:1px solid rgba(29,185,84,0.2);padding:6px 12px;border-radius:20px\">{{ pt.name }} <span style=\"color:#1DB954;font-weight:600\">{{ pt.countLabel }}<\u002Fspan><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:24px;padding:16px 20px;background:rgba(88,166,255,0.05);border:1px solid rgba(88,166,255,0.15);border-radius:8px;font-size:12px;color:#8b949e;line-height:1.6\">\n          <span style=\"color:#58a6ff;font-weight:600\">Next →<\u002Fspan> The overview proves discovery is real, sized, and not universally hated. The natural next question is <span style=\"color:#c9d1d9\">why<\u002Fspan> — for frustrated users, what is going wrong, and what were they trying to do?\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= DISCOVERY DEEP DIVE ================= -->\n    <sc-if value=\"{{ showDiscovery }}\">\n      <div style=\"margin-bottom:20px\">\n        <div style=\"font-size:10px;font-weight:600;color:#484f58;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px\">Discovery Deep Dive<\u002Fdiv>\n        <div style=\"font-size:24px;font-weight:700;color:#fff;letter-spacing:-0.02em\">What's going wrong, and what users were trying to do<\u002Fdiv>\n        <div style=\"font-size:13px;color:#8b949e;margin-top:6px\">{{ deepCodedCount }} deep-coded discovery reviews. The data points to the answers — it never announces them.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ===== NARRATIVE BUCKETS ===== -->\n      <div>\n        <!-- BUCKET 1 -->\n        <div style=\"margin-bottom:36px\">\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:4px\">\n            <div style=\"font-size:11px;font-weight:700;color:#58a6ff;background:rgba(88,166,255,0.12);width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center\">1<\u002Fdiv>\n            <div style=\"font-size:16px;font-weight:600;color:#fff\">Listening behaviour — what users are trying to achieve<\u002Fdiv>\n            <div style=\"font-size:9px;font-weight:600;color:#d29922;background:rgba(210,153,34,0.1);padding:2px 8px;border-radius:3px;text-transform:uppercase;letter-spacing:0.4px\">Exploratory<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:11px;color:#484f58;margin-bottom:16px;padding-left:34px\">Goals and contexts users describe. Reviews disclose goals only sometimes — treat as directional. <span style=\"color:#3a4350\">↳ addresses Q3: behaviours users want<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:8px;padding-left:34px\">\n            <sc-for list=\"{{ behaviors }}\" as=\"b\" hint-placeholder-count=\"7\">\n              <div style=\"display:flex;justify-content:space-between;align-items:center;padding:9px 14px;background:#161b22;border-radius:6px;border:1px solid #21262d\">\n                <div style=\"font-size:12px;color:#8b949e\">{{ b.name }}<\u002Fdiv>\n                <div style=\"font-size:12px;font-weight:600;color:#c9d1d9\">{{ b.mentionLabel }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- REPETITION BRIDGE -->\n        <div style=\"margin-bottom:36px;background:#0f1318;border:1px solid #21262d;border-radius:12px;padding:28px\">\n          <div style=\"text-align:center;margin-bottom:24px\">\n            <div style=\"font-size:9px;font-weight:600;color:#1DB954;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px\">The repetition bridge<\u002Fdiv>\n            <div style=\"font-size:17px;font-weight:600;color:#fff;font-style:italic\">\"Users listen to the same music repeatedly\"<\u002Fdiv>\n            <div style=\"font-size:11px;color:#484f58;margin-top:6px\">{{ bridgeTotal }} reviews — the same observed behaviour splits two ways<\u002Fdiv>\n            <div style=\"width:1px;height:20px;background:#30363d;margin:14px auto 0\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px\">\n            <!-- CHOSEN -->\n            <div style=\"background:rgba(29,185,84,0.05);border:1px solid rgba(29,185,84,0.2);border-radius:10px;padding:20px\">\n              <div style=\"display:flex;align-items:baseline;gap:10px;margin-bottom:4px\">\n                <div style=\"font-size:24px;font-weight:700;color:#1DB954;letter-spacing:-0.03em\">{{ chosenTotal }}<\u002Fdiv>\n                <div style=\"font-size:13px;font-weight:600;color:#c9d1d9\">{{ chosenLabel }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:11px;color:#1DB954;margin-bottom:14px\">{{ chosenSub }}<\u002Fdiv>\n              <sc-for list=\"{{ chosenItems }}\" as=\"it\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid rgba(29,185,84,0.1);font-size:12px\">\n                  <div style=\"color:#8b949e\">{{ it.name }}<\u002Fdiv>\n                  <div style=\"color:#c9d1d9;font-weight:600\">{{ it.countLabel }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <div style=\"font-size:11px;color:#484f58;margin-top:12px;font-style:italic\">↳ {{ chosenFlow }}<\u002Fdiv>\n            <\u002Fdiv>\n            <!-- IMPOSED -->\n            <div style=\"background:rgba(248,81,73,0.05);border:1px solid rgba(248,81,73,0.2);border-radius:10px;padding:20px\">\n              <div style=\"display:flex;align-items:baseline;gap:10px;margin-bottom:4px\">\n                <div style=\"font-size:24px;font-weight:700;color:#f85149;letter-spacing:-0.03em\">{{ imposedTotal }}<\u002Fdiv>\n                <div style=\"font-size:13px;font-weight:600;color:#c9d1d9\">{{ imposedLabel }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:11px;color:#f85149;margin-bottom:14px\">{{ imposedSub }}<\u002Fdiv>\n              <sc-for list=\"{{ imposedItems }}\" as=\"it\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid rgba(248,81,73,0.1);font-size:12px\">\n                  <div style=\"color:#8b949e\">{{ it.name }}<\u002Fdiv>\n                  <div style=\"color:#c9d1d9;font-weight:600\">{{ it.countLabel }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <div style=\"font-size:11px;color:#484f58;margin-top:12px;font-style:italic\">↳ {{ imposedFlow }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- BUCKET 2 -->\n        <div style=\"margin-bottom:36px\">\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:4px\">\n            <div style=\"font-size:11px;font-weight:700;color:#f85149;background:rgba(248,81,73,0.12);width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center\">2<\u002Fdiv>\n            <div style=\"font-size:16px;font-weight:600;color:#fff\">Problems finding new music<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:11px;color:#484f58;margin-bottom:16px;padding-left:34px\">Sub-themes of <span style=\"color:#8b949e\">finding<\u002Fspan> new music. <span style=\"color:#3a4350\">↳ addresses Q1: why discovery struggles<\u002Fspan><\u002Fdiv>\n          <div style=\"padding-left:34px\">\n            <sc-for list=\"{{ findingThemes }}\" as=\"t\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex;align-items:center;gap:12px;padding:6px 0\">\n                <div style=\"width:200px;font-size:12px;color:{{ t.nameColor }};font-weight:{{ t.nameWeight }}\">{{ t.name }}<\u002Fdiv>\n                <div style=\"flex:1;height:22px;background:#161b22;border-radius:4px;overflow:hidden\">\n                  <div style=\"height:100%;border-radius:4px;width:{{ t.barWidth }};background:{{ t.barColor }}\"><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"width:44px;text-align:right;font-size:12px;font-weight:600;color:#c9d1d9\">{{ t.pctLabel }}<\u002Fdiv>\n                <div style=\"width:32px;text-align:right;font-size:11px;color:#484f58\">{{ t.countLabel }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <div style=\"font-size:11px;color:#484f58;margin-top:8px;font-style:italic\">+ emerging / other: {{ findingEmerging }} reviews — nothing force-fit.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- BUCKET 3 -->\n        <div style=\"margin-bottom:40px\">\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:4px\">\n            <div style=\"font-size:11px;font-weight:700;color:#f85149;background:rgba(248,81,73,0.12);width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center\">3<\u002Fdiv>\n            <div style=\"font-size:16px;font-weight:600;color:#fff\">Problems with the recommendation system<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:11px;color:#484f58;margin-bottom:16px;padding-left:34px\">Sub-themes of <span style=\"color:#8b949e\">what gets served<\u002Fspan>. <span style=\"color:#3a4350\">↳ addresses Q2: recommendation frustrations<\u002Fspan><\u002Fdiv>\n          <div style=\"padding-left:34px\">\n            <sc-for list=\"{{ recThemes }}\" as=\"t\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex;align-items:center;gap:12px;padding:6px 0\">\n                <div style=\"width:200px;font-size:12px;color:{{ t.nameColor }};font-weight:{{ t.nameWeight }}\">{{ t.name }}<\u002Fdiv>\n                <div style=\"flex:1;height:22px;background:#161b22;border-radius:4px;overflow:hidden\">\n                  <div style=\"height:100%;border-radius:4px;width:{{ t.barWidth }};background:{{ t.barColor }}\"><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"width:44px;text-align:right;font-size:12px;font-weight:600;color:#c9d1d9\">{{ t.pctLabel }}<\u002Fdiv>\n                <div style=\"width:32px;text-align:right;font-size:11px;color:#484f58\">{{ t.countLabel }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <div style=\"font-size:11px;color:#484f58;margin-top:8px;font-style:italic\">+ emerging / other: {{ recEmerging }} reviews.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ===== TWO INDEPENDENT PARALLEL READS ===== -->\n      <div style=\"border-top:1px solid #21262d;padding-top:32px;margin-top:8px\">\n        <div style=\"font-size:13px;font-weight:600;color:#fff;margin-bottom:4px\">Two independent reads<\u002Fdiv>\n        <div style=\"font-size:11px;color:#484f58;margin-bottom:20px\">Read off the same pool as flat, standalone synthesis — <span style=\"color:#8b949e\">not<\u002Fspan> slices of the sub-themes above.<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px\">\n          <!-- UNMET NEEDS -->\n          <div>\n            <div style=\"font-size:13px;font-weight:600;color:#c9d1d9;margin-bottom:4px\">Recurring unmet needs<\u002Fdiv>\n            <div style=\"font-size:10px;color:#484f58;margin-bottom:14px\">Ranked by frequency. <span style=\"color:#3a4350\">↳ addresses Q6<\u002Fspan><\u002Fdiv>\n            <sc-for list=\"{{ unmetNeeds }}\" as=\"need\" hint-placeholder-count=\"6\">\n              <div style=\"display:flex;align-items:center;gap:14px;padding:11px 16px;background:#161b22;border-radius:8px;margin-bottom:6px;border:1px solid #21262d\">\n                <div style=\"font-size:18px;font-weight:700;color:#30363d;width:24px;text-align:center\">{{ need.rank }}<\u002Fdiv>\n                <div style=\"flex:1\"><div style=\"font-size:13px;color:#e6edf3;font-weight:500\">{{ need.need }}<\u002Fdiv><div style=\"font-size:11px;color:#484f58;margin-top:2px\">{{ need.mentionLabel }}<\u002Fdiv><\u002Fdiv>\n                <div style=\"font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;color:{{ need.strengthColor }};padding:3px 9px;border-radius:4px;border:1px solid {{ need.strengthBorder }}\">{{ need.strength }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <!-- SEGMENTS -->\n          <div>\n            <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:4px\">\n              <div style=\"font-size:13px;font-weight:600;color:#c9d1d9\">Use-case segments<\u002Fdiv>\n              <div style=\"font-size:9px;font-weight:600;color:#f85149;background:rgba(248,81,73,0.1);padding:2px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:0.4px\">Exploratory<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:10px;color:#484f58;margin-bottom:14px\">Self-disclosed use cases, partial coverage. <span style=\"color:#3a4350\">↳ addresses Q5<\u002Fspan><\u002Fdiv>\n            <sc-for list=\"{{ segments }}\" as=\"seg\" hint-placeholder-count=\"4\">\n              <div style=\"padding:14px 16px;background:#161b22;border-radius:8px;margin-bottom:6px;border:1px solid #21262d\">\n                <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:6px\">\n                  <div style=\"font-size:13px;font-weight:600;color:#e6edf3\">{{ seg.name }}<\u002Fdiv>\n                  <div style=\"font-size:9px;font-weight:600;color:{{ seg.baseColor }};text-transform:uppercase;letter-spacing:0.3px\">{{ seg.baseFlag }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex;gap:14px;font-size:10px;color:#484f58\"><div>{{ seg.sizeLabel }} of sample<\u002Fdiv><div>{{ seg.ratingLabel }} avg<\u002Fdiv><div style=\"color:#1DB954\">{{ seg.discoveryLabel }} discovery<\u002Fdiv><\u002Fdiv>\n                <div style=\"font-size:10px;color:#8b949e;margin-top:4px\">Top: {{ seg.topTheme }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:24px;padding:16px 20px;background:rgba(88,166,255,0.05);border:1px solid rgba(88,166,255,0.15);border-radius:8px;font-size:12px;color:#8b949e;line-height:1.6\">\n          <span style=\"color:#58a6ff;font-weight:600\">Next →<\u002Fspan> Every theme, need, and segment above is a claim. The reader who wants to verify any of them clicks through to the evidence.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= EVIDENCE EXPLORER ================= -->\n    <sc-if value=\"{{ showEvidence }}\">\n      <div style=\"margin-bottom:24px\">\n        <div style=\"font-size:10px;font-weight:600;color:#484f58;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px\">Evidence Explorer<\u002Fdiv>\n        <div style=\"font-size:24px;font-weight:700;color:#fff;letter-spacing:-0.02em\">The receipts<\u002Fdiv>\n        <div style=\"font-size:13px;color:#8b949e;margin-top:6px\">Pull any thread and check it against raw text. Each quote shows the snippet that justified its tag.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- FILTER CHIPS -->\n      <div style=\"display:flex;gap:24px;flex-wrap:wrap;margin-bottom:24px;padding:16px 20px;background:#161b22;border:1px solid #21262d;border-radius:10px\">\n        <div>\n          <div style=\"font-size:10px;color:#484f58;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px\">Sentiment<\u002Fdiv>\n          <div style=\"display:flex;gap:6px\">\n            <sc-for list=\"{{ sentimentChips }}\" as=\"c\" hint-placeholder-count=\"3\">\n              <div onclick=\"{{ c.onClick }}\" style=\"font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;background:{{ c.bg }};color:{{ c.color }};border:1px solid {{ c.border }}\">{{ c.label }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:10px;color:#484f58;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px\">Platform<\u002Fdiv>\n          <div style=\"display:flex;gap:6px\">\n            <sc-for list=\"{{ platformChips }}\" as=\"c\" hint-placeholder-count=\"3\">\n              <div onclick=\"{{ c.onClick }}\" style=\"font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;background:{{ c.bg }};color:{{ c.color }};border:1px solid {{ c.border }}\">{{ c.label }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:10px;color:#484f58;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px\">Country<\u002Fdiv>\n          <div style=\"display:flex;gap:6px\">\n            <sc-for list=\"{{ countryChips }}\" as=\"c\" hint-placeholder-count=\"4\">\n              <div onclick=\"{{ c.onClick }}\" style=\"font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;background:{{ c.bg }};color:{{ c.color }};border:1px solid {{ c.border }}\">{{ c.label }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;gap:24px\">\n        <!-- SUB-THEME LIST -->\n        <div style=\"width:220px;flex-shrink:0\">\n          <div style=\"font-size:10px;color:#484f58;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px\">Discovery sub-theme<\u002Fdiv>\n          <sc-for list=\"{{ themeList }}\" as=\"tl\" hint-placeholder-count=\"9\">\n            <div onclick=\"{{ tl.onClick }}\" style=\"padding:9px 14px;cursor:pointer;font-size:12px;color:{{ tl.color }};background:{{ tl.bg }};border:{{ tl.border }};border-radius:6px;margin-bottom:4px;transition:all 0.12s;font-weight:{{ tl.weight }}\">\n              <div>{{ tl.name }}<\u002Fdiv>\n              <div style=\"font-size:10px;color:#484f58;margin-top:2px\">{{ tl.countLabel }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <!-- QUOTES -->\n        <div style=\"flex:1;min-width:0\">\n          <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px\">\n            <div style=\"font-size:14px;font-weight:600;color:#fff\">{{ selectedThemeName }}<\u002Fdiv>\n            <div style=\"font-size:11px;color:#484f58\">{{ quoteCountLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ quotes }}\" as=\"q\" hint-placeholder-count=\"3\">\n            <div style=\"background:#161b22;border-radius:8px;padding:18px 20px;margin-bottom:10px;border:1px solid #21262d;border-left:3px solid {{ q.accent }}\">\n              <div style=\"font-size:13px;color:#e6edf3;line-height:1.6;font-style:italic\">\"{{ q.text }}\"<\u002Fdiv>\n              <div style=\"display:flex;gap:12px;align-items:center;margin-top:12px;flex-wrap:wrap\">\n                <div style=\"font-size:10px;color:#8b949e;background:#21262d;padding:3px 8px;border-radius:4px\">{{ q.themeTag }}<\u002Fdiv>\n                <div style=\"font-size:11px;color:{{ q.sentColor }};font-weight:600\">{{ q.sentLabel }}<\u002Fdiv>\n                <div style=\"font-size:11px;color:{{ q.starColor }}\">{{ q.starDisplay }}<\u002Fdiv>\n                <div style=\"font-size:11px;color:#484f58\">{{ q.meta }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <sc-if value=\"{{ noQuotes }}\">\n            <div style=\"padding:40px;text-align:center;font-size:12px;color:#484f58;background:#161b22;border-radius:8px;border:1px dashed #21262d\">No quotes match these filters.<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= METHODOLOGY & EVALUATION ================= -->\n    <sc-if value=\"{{ showMethodology }}\">\n      <div style=\"margin-bottom:28px\">\n        <div style=\"font-size:10px;font-weight:600;color:#484f58;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px\">Methodology &amp; Evaluation<\u002Fdiv>\n        <div style=\"font-size:24px;font-weight:700;color:#fff;letter-spacing:-0.02em\">Here's how this was built<\u002Fdiv>\n        <div style=\"font-size:13px;color:#8b949e;margin-top:6px\">Presented as visuals, not paragraphs. Nothing is asserted that can't be checked.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- FUNNEL -->\n      <div style=\"margin-bottom:36px\">\n        <div style=\"font-size:14px;font-weight:600;color:#fff;margin-bottom:16px\">Collection funnel<\u002Fdiv>\n        <sc-for list=\"{{ funnelSteps }}\" as=\"step\" hint-placeholder-count=\"6\">\n          <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:8px\">\n            <div style=\"width:150px;font-size:12px;color:#8b949e;text-align:right\">{{ step.label }}<\u002Fdiv>\n            <div style=\"flex:1;height:26px;background:#161b22;border-radius:4px;overflow:hidden\">\n              <div style=\"height:100%;background:{{ step.barColor }};border-radius:4px;width:{{ step.barWidth }};transition:width 0.5s\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"width:56px;font-size:12px;font-weight:600;color:#c9d1d9;text-align:right\">{{ step.countLabel }}<\u002Fdiv>\n            <div style=\"width:90px;font-size:11px;color:#f85149;text-align:right\">{{ step.removedLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <div style=\"font-size:11px;color:#484f58;margin-top:12px;padding-left:164px\">Tier A (deep-codeable): 1,847 · Tier B (thin but categorisable): 892 · Tier C (rating only): 673<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ACCURACY + WINDOW -->\n      <div style=\"display:grid;grid-template-columns:0.8fr 1.2fr;gap:20px;margin-bottom:36px\">\n        <div style=\"background:#161b22;border-radius:10px;padding:24px;border:1px solid #21262d;text-align:center;display:flex;flex-direction:column;justify-content:center\">\n          <div style=\"font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:0.5px\">Gold-set agreement<\u002Fdiv>\n          <div style=\"font-size:48px;font-weight:700;color:#1DB954;margin-top:6px;letter-spacing:-0.04em\">84%<\u002Fdiv>\n          <div style=\"font-size:11px;color:#484f58;margin-top:4px\">vs 50-review gold set · per-category detail in the evaluation layer below<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#161b22;border-radius:10px;padding:22px 24px;border:1px solid #21262d\">\n          <div style=\"font-size:14px;font-weight:600;color:#fff;margin-bottom:8px\">Analysis window<\u002Fdiv>\n          <div style=\"font-size:12px;color:#8b949e;line-height:1.6\">{{ windowJustification }}<\u002Fdiv>\n          <div style=\"display:flex;gap:20px;margin-top:14px;padding-top:14px;border-top:1px solid #21262d;font-size:11px;color:#484f58\">\n            <div><span style=\"color:#8b949e;font-weight:500\">Collection:<\u002Fspan> Jun 2025 – Jun 2026<\u002Fdiv>\n            <div><span style=\"color:#8b949e;font-weight:500\">Analysis:<\u002Fspan> Dec 2025 – Jun 2026<\u002Fdiv>\n            <div><span style=\"color:#8b949e;font-weight:500\">Updates spanned:<\u002Fspan> 4<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- DENOMINATORS + SENTIMENT BASELINE -->\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:36px\">\n        <div style=\"background:#161b22;border-radius:10px;padding:22px 24px;border:1px solid #21262d\">\n          <div style=\"font-size:14px;font-weight:600;color:#fff;margin-bottom:12px\">Denominators, stated explicitly<\u002Fdiv>\n          <div style=\"font-size:12px;color:#8b949e;line-height:1.7\">\n            <div style=\"margin-bottom:6px\"><span style=\"color:#c9d1d9;font-weight:500\">Category share of voice:<\u002Fspan> % of 2,739 substantive reviews (Tier A+B)<\u002Fdiv>\n            <div style=\"margin-bottom:6px\"><span style=\"color:#c9d1d9;font-weight:500\">Discovery sub-themes:<\u002Fspan> % of 412 deep-coded reviews (Tier A)<\u002Fdiv>\n            <div style=\"margin-bottom:6px\"><span style=\"color:#c9d1d9;font-weight:500\">Star baseline:<\u002Fspan> all 3,412 English reviews incl. contentless (A+B+C)<\u002Fdiv>\n            <div><span style=\"color:#c9d1d9;font-weight:500\">Effect size:<\u002Fspan> discovery avg − overall avg, same reviewer pool<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#161b22;border-radius:10px;padding:22px 24px;border:1px solid #21262d\">\n          <div style=\"font-size:14px;font-weight:600;color:#fff;margin-bottom:12px\">How the sentiment baseline is computed<\u002Fdiv>\n          <div style=\"font-size:12px;color:#8b949e;line-height:1.7\">Sentiment is read from a broad first pass over every substantive review, scored positive / negative / mixed from the review text — independent of the star rating. The star histogram is kept as a separate, rating-only signal so the two can be cross-checked rather than conflated.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- LIMITATIONS -->\n      <div style=\"margin-bottom:48px\">\n        <div style=\"font-size:14px;font-weight:600;color:#fff;margin-bottom:14px\">Limitations, stated plainly<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:4px 24px\">\n          <sc-for list=\"{{ limitations }}\" as=\"lim\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex;gap:10px;align-items:flex-start;padding:6px 0\">\n              <div style=\"color:#f85149;font-size:7px;margin-top:6px;flex-shrink:0\">●<\u002Fdiv>\n              <div style=\"font-size:12px;color:#8b949e;line-height:1.5\">{{ lim.text }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ===== THE EXPANDER ===== -->\n      <div style=\"text-align:center;padding:8px 0 4px\">\n        <div onclick=\"{{ toggleEval }}\" style=\"display:inline-block;cursor:pointer;font-size:16px;font-weight:600;color:#1DB954;letter-spacing:-0.01em;padding:14px 28px;border:1px solid rgba(29,185,84,0.3);border-radius:30px;background:rgba(29,185,84,0.06);transition:all 0.15s\" style-hover=\"background:rgba(29,185,84,0.12);border-color:rgba(29,185,84,0.5)\">\n          Wondering if the data is reliable? Here's how. {{ evalChevron }}\n        <\u002Fdiv>\n        <div style=\"font-size:11px;color:#484f58;margin-top:10px\">{{ evalHint }}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ===== EVALUATION LAYER (expands inline) ===== -->\n      <sc-if value=\"{{ evalOpen }}\">\n        <div style=\"margin-top:40px;padding-top:40px;border-top:1px solid #21262d;animation:atlasReveal 0.4s ease\">\n          <div style=\"margin-bottom:28px\">\n            <div style=\"font-size:10px;font-weight:600;color:#484f58;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px\">Evaluation layer<\u002Fdiv>\n            <div style=\"font-size:20px;font-weight:700;color:#fff;letter-spacing:-0.02em\">The quality checks, as pictures rather than promises<\u002Fdiv>\n            <div style=\"font-size:12px;color:#8b949e;margin-top:6px\">An eval the evaluator can see beats one they have to take on trust.<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- 1. SAMPLING FAIRNESS -->\n          <div style=\"margin-bottom:36px\">\n            <div style=\"font-size:13px;font-weight:600;color:#c9d1d9;margin-bottom:4px\">1 · Sampling fairness<\u002Fdiv>\n            <div style=\"font-size:11px;color:#484f58;margin-bottom:16px\">Collected star distribution against each store's publicly reported distribution. The gap is the point.<\u002Fdiv>\n            <div style=\"display:flex;align-items:flex-end;gap:20px;height:170px;padding:0 8px\">\n              <sc-for list=\"{{ samplingBars }}\" as=\"b\" hint-placeholder-count=\"5\">\n                <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end\">\n                  <div style=\"width:100%;display:flex;gap:5px;align-items:flex-end;height:120px;justify-content:center\">\n                    <div style=\"width:40%;background:#484f58;border-radius:3px 3px 0 0;height:{{ b.collectedH }}\" title=\"collected\"><\u002Fdiv>\n                    <div style=\"width:40%;background:#1DB954;border-radius:3px 3px 0 0;height:{{ b.storeH }}\" title=\"store-reported\"><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"font-size:11px;color:#8b949e\">{{ b.label }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:18px;margin-top:12px;font-size:11px;color:#8b949e\">\n              <div style=\"display:flex;align-items:center;gap:6px\"><div style=\"width:10px;height:10px;background:#484f58;border-radius:2px\"><\u002Fdiv>Collected<\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:6px\"><div style=\"width:10px;height:10px;background:#1DB954;border-radius:2px\"><\u002Fdiv>Store-reported<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:12px;color:#484f58;margin-top:12px;line-height:1.5\">{{ samplingNote }}<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- 2. FUNNEL RECONCILIATION -->\n          <div style=\"margin-bottom:36px\">\n            <div style=\"font-size:13px;font-weight:600;color:#c9d1d9;margin-bottom:4px\">2 · Funnel reconciliation<\u002Fdiv>\n            <div style=\"font-size:11px;color:#484f58;margin-bottom:16px\">The same funnel, shown to conserve at every step: in = out + removed.<\u002Fdiv>\n            <div style=\"background:#161b22;border:1px solid #21262d;border-radius:10px;overflow:hidden\">\n              <sc-for list=\"{{ reconcileRows }}\" as=\"r\" hint-placeholder-count=\"6\">\n                <div style=\"display:flex;align-items:center;gap:16px;padding:12px 20px;border-bottom:1px solid #21262d;font-size:12px\">\n                  <div style=\"width:150px;color:#c9d1d9;font-weight:500\">{{ r.step }}<\u002Fdiv>\n                  <div style=\"flex:1;color:#484f58;font-family:monospace;font-size:12px\">{{ r.equation }}<\u002Fdiv>\n                  <div style=\"color:#8b949e\">{{ r.reason }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- 3. FIELD INTEGRITY -->\n          <div style=\"margin-bottom:36px\">\n            <div style=\"font-size:13px;font-weight:600;color:#c9d1d9;margin-bottom:4px\">3 · Field integrity<\u002Fdiv>\n            <div style=\"font-size:11px;color:#484f58;margin-bottom:16px\">% valid records and count quarantined per field — a missing rating was quarantined, never coerced to zero.<\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:12px\">\n              <sc-for list=\"{{ fieldCards }}\" as=\"f\" hint-placeholder-count=\"5\">\n                <div style=\"background:#161b22;border:1px solid #21262d;border-radius:10px;padding:16px;text-align:center\">\n                  <div style=\"font-size:24px;font-weight:700;color:{{ f.valColor }};letter-spacing:-0.03em\">{{ f.validLabel }}<\u002Fdiv>\n                  <div style=\"font-size:11px;color:#8b949e;margin-top:4px\">{{ f.field }}<\u002Fdiv>\n                  <div style=\"font-size:10px;color:#484f58;margin-top:6px\">{{ f.quarantinedLabel }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- 4. LANGUAGE SPOT-CHECK -->\n          <div style=\"margin-bottom:36px\">\n            <div style=\"font-size:13px;font-weight:600;color:#c9d1d9;margin-bottom:4px\">4 · Language-filter spot-check<\u002Fdiv>\n            <div style=\"font-size:11px;color:#484f58;margin-bottom:16px\">Measured error rates of the English filter, with a code-switched worked example.<\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:0.7fr 1.3fr;gap:16px\">\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px\">\n                <div style=\"background:#161b22;border:1px solid #21262d;border-radius:10px;padding:18px;text-align:center\">\n                  <div style=\"font-size:28px;font-weight:700;color:#d29922\">{{ falseDrop }}<\u002Fdiv>\n                  <div style=\"font-size:10px;color:#8b949e;margin-top:4px\">False-drop rate<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"background:#161b22;border:1px solid #21262d;border-radius:10px;padding:18px;text-align:center\">\n                  <div style=\"font-size:28px;font-weight:700;color:#d29922\">{{ falseKeep }}<\u002Fdiv>\n                  <div style=\"font-size:10px;color:#8b949e;margin-top:4px\">False-keep rate<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:#161b22;border:1px solid #21262d;border-radius:10px;padding:18px 20px;border-left:3px solid #d29922\">\n                <div style=\"font-size:13px;color:#e6edf3;font-style:italic;line-height:1.6\">\"{{ langExample }}\"<\u002Fdiv>\n                <div style=\"font-size:11px;color:#8b949e;margin-top:10px;line-height:1.5\">{{ langVerdict }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- 5. CONFUSION MATRIX -->\n          <div style=\"margin-bottom:36px\">\n            <div style=\"font-size:13px;font-weight:600;color:#c9d1d9;margin-bottom:4px\">5 · Per-category accuracy <span style=\"color:#1DB954;font-weight:500\">· the centrepiece<\u002Fspan><\u002Fdiv>\n            <div style=\"font-size:11px;color:#484f58;margin-bottom:16px\">Classifier labels vs the gold set. Rows = truth, columns = predicted. Discovery's row and column are highlighted.<\u002Fdiv>\n            <div style=\"display:inline-block;background:#161b22;border:1px solid #21262d;border-radius:10px;padding:18px\">\n              <div style=\"display:flex;align-items:center;gap:0;margin-bottom:6px;margin-left:90px\">\n                <sc-for list=\"{{ confLabels }}\" as=\"cl\" hint-placeholder-count=\"6\">\n                  <div style=\"width:54px;text-align:center;font-size:10px;color:{{ cl.color }};font-weight:{{ cl.weight }}\">{{ cl.short }}<\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <sc-for list=\"{{ confRows }}\" as=\"row\" hint-placeholder-count=\"6\">\n                <div style=\"display:flex;align-items:center;gap:0;margin-bottom:3px\">\n                  <div style=\"width:90px;text-align:right;padding-right:10px;font-size:10px;color:{{ row.color }};font-weight:{{ row.weight }}\">{{ row.label }}<\u002Fdiv>\n                  <sc-for list=\"{{ row.cells }}\" as=\"cell\" hint-placeholder-count=\"6\">\n                    <div style=\"width:51px;height:38px;margin:1.5px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;background:{{ cell.bg }};color:{{ cell.color }};border:{{ cell.ring }}\">{{ cell.val }}<\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <div style=\"font-size:11px;color:#8b949e;margin-top:12px;margin-left:90px\">Discovery standalone accuracy: <span style=\"color:#1DB954;font-weight:600\">{{ discoveryAccuracy }}<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- 6. GOLD-SET COMPOSITION -->\n          <div style=\"margin-bottom:36px\">\n            <div style=\"font-size:13px;font-weight:600;color:#c9d1d9;margin-bottom:4px\">6 · Gold-set composition<\u002Fdiv>\n            <div style=\"font-size:11px;color:#484f58;margin-bottom:16px\">Deliberately weighted toward hard borderline cases and covering all six categories — the accuracy number isn't flattered by easy examples.<\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px\">\n              <div>\n                <div style=\"font-size:11px;color:#8b949e;margin-bottom:10px\">Difficulty mix ({{ goldTotal }} reviews)<\u002Fdiv>\n                <div style=\"display:flex;height:40px;border-radius:8px;overflow:hidden;margin-bottom:8px\">\n                  <div style=\"width:{{ borderlineWidth }};background:#bc8cff;display:flex;align-items:center;padding-left:12px;font-size:11px;color:#0d1117;font-weight:600\">Borderline {{ borderlineCount }}<\u002Fdiv>\n                  <div style=\"width:{{ easyWidth }};background:#30363d;display:flex;align-items:center;padding-left:12px;font-size:11px;color:#8b949e;font-weight:600\">Easy {{ easyCount }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div>\n                <div style=\"font-size:11px;color:#8b949e;margin-bottom:10px\">Coverage per category<\u002Fdiv>\n                <sc-for list=\"{{ goldCoverage }}\" as=\"g\" hint-placeholder-count=\"6\">\n                  <div style=\"display:flex;align-items:center;gap:10px;padding:3px 0\">\n                    <div style=\"width:80px;font-size:11px;color:{{ g.color }};font-weight:{{ g.weight }}\">{{ g.cat }}<\u002Fdiv>\n                    <div style=\"flex:1;height:14px;background:#161b22;border-radius:3px;overflow:hidden\"><div style=\"height:100%;width:{{ g.barWidth }};background:{{ g.barColor }};border-radius:3px\"><\u002Fdiv><\u002Fdiv>\n                    <div style=\"width:24px;text-align:right;font-size:11px;color:#c9d1d9;font-weight:600\">{{ g.count }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- 7. ABSTENTION CALIBRATION -->\n          <div>\n            <div style=\"font-size:13px;font-weight:600;color:#c9d1d9;margin-bottom:4px\">7 · Abstention calibration<\u002Fdiv>\n            <div style=\"font-size:11px;color:#484f58;margin-bottom:16px\">Accuracy of confident labels vs abstained / uncertain ones — confidence tracks correctness.<\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n              <div style=\"background:#161b22;border:1px solid #21262d;border-radius:10px;padding:20px\">\n                <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px\">\n                  <div style=\"font-size:12px;color:#8b949e\">Confident labels <span style=\"color:#484f58\">({{ confidentShare }} of set)<\u002Fspan><\u002Fdiv>\n                  <div style=\"font-size:22px;font-weight:700;color:#1DB954\">{{ confidentAccuracy }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"height:10px;background:#21262d;border-radius:5px;overflow:hidden\"><div style=\"height:100%;width:{{ confidentAccuracy }};background:#1DB954;border-radius:5px\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:#161b22;border:1px solid #21262d;border-radius:10px;padding:20px\">\n                <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px\">\n                  <div style=\"font-size:12px;color:#8b949e\">Abstained labels <span style=\"color:#484f58\">({{ abstainedShare }} of set)<\u002Fspan><\u002Fdiv>\n                  <div style=\"font-size:22px;font-weight:700;color:#d29922\">{{ abstainedAccuracy }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"height:10px;background:#21262d;border-radius:5px;overflow:hidden\"><div style=\"height:100%;width:{{ abstainedAccuracy }};background:#d29922;border-radius:5px\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"margin-top:32px;padding:18px 22px;background:rgba(29,185,84,0.05);border:1px solid rgba(29,185,84,0.15);border-radius:10px;font-size:13px;color:#8b949e;line-height:1.6;text-align:center\">\n              By the end, the reader has seen the problem sized, the balanced picture, the deep diagnosis, the raw evidence, and the proof that the machinery underneath is sound. <span style=\"color:#c9d1d9\">Nothing is asserted that can't be checked.<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    activeSection: 'overview',\n    deepView: 'narrative',\n    selectedTheme: 'repeat',\n    evalOpen: false,\n    evSentiment: 'all',\n    evPlatform: 'all',\n    evCountry: 'all'\n  };\n\n  renderVals() {\n    const d = window.REVIEW_DATA;\n    if (!d) return this.emptyState();\n    const S = this.state;\n\n    // ---------- NAV ----------\n    const sections = [\n      { id: 'overview', label: 'Overview' },\n      { id: 'discovery', label: 'Discovery Deep Dive' },\n      { id: 'evidence', label: 'Evidence Explorer' },\n      { id: 'methodology', label: 'Methodology & Evaluation' }\n    ];\n    const navItems = sections.map(s => ({\n      label: s.label,\n      color: S.activeSection === s.id ? '#fff' : '#8b949e',\n      bg: S.activeSection === s.id ? 'rgba(29,185,84,0.08)' : 'transparent',\n      borderColor: S.activeSection === s.id ? '#1DB954' : 'transparent',\n      onClick: () => this.setState({ activeSection: s.id })\n    }));\n\n    // ---------- OVERVIEW: categories ----------\n    const maxCat = Math.max(...d.categories.map(c => c.count));\n    const categories = d.categories.map(c => {\n      const isDisco = c.id === 'discovery';\n      return {\n        name: c.name,\n        barWidth: (c.count / maxCat * 100) + '%',\n        barColor: isDisco ? '#1DB954' : '#30363d',\n        nameColor: isDisco ? '#1DB954' : '#c9d1d9',\n        nameWeight: isDisco ? '600' : '400',\n        pctLabel: c.pct + '% (n=' + c.count + ')',\n        pctColor: isDisco ? '#1DB954' : '#c9d1d9',\n        ratingLabel: c.avgRating + '★'\n      };\n    });\n\n    // rating distribution\n    const maxDist = Math.max(...d.baseline.distribution.map(x => x.pct));\n    const ratingDist = d.baseline.distribution.map(r => ({\n      pctLabel: r.pct + '%',\n      barHeight: (r.pct / maxDist * 100) + '%',\n      barColor: r.stars <= 2 ? '#f85149' : r.stars === 3 ? '#d29922' : '#1DB954',\n      label: r.stars + '★',\n      countLabel: 'n=' + r.count\n    }));\n\n    // trend line chart\n    const tr = d.trends;\n    const tmin = 14, tmax = 20;\n    const W = 680, padX = 26, padTop = 12, padBot = 28, H = 150;\n    const innerW = W - padX * 2, innerH = H - padTop - padBot;\n    const tpts = tr.map((t, i) => ({\n      x: padX + innerW * (i / (tr.length - 1)),\n      y: padTop + innerH * (1 - (t.discoveryPct - tmin) / (tmax - tmin)),\n      month: t.month\n    }));\n    const trendLinePoints = tpts.map(p => p.x.toFixed(1) + ',' + p.y.toFixed(1)).join(' ');\n    const trendAreaPoints = padX + ',' + (padTop + innerH) + ' ' + trendLinePoints + ' ' + (padX + innerW) + ',' + (padTop + innerH);\n    const trendDots = tpts.map(p => ({ cx: +p.x.toFixed(1), cy: +p.y.toFixed(1) }));\n    const trendLabels = tpts.map(p => ({ x: +p.x.toFixed(1), label: p.month }));\n\n    // delight\n    const maxDel = Math.max(...d.delight.byCategory.map(c => c.pct));\n    const delightByCategory = d.delight.byCategory.map(c => ({\n      name: c.name, barWidth: (c.pct / 100 * 100) + '%', pctLabel: c.pct + '%'\n    }));\n    const delightThemes = d.delight.topThemes.map(t => ({ name: t.name, countLabel: 'n=' + t.count }));\n\n    // sentiment split\n    const sentimentSplit = d.sentimentSplit.map(s => {\n      const isDisco = s.id === 'discovery';\n      return {\n        name: s.name,\n        nameColor: isDisco ? '#1DB954' : '#c9d1d9',\n        nameWeight: isDisco ? '600' : '400',\n        posWidth: s.pos + '%', negWidth: s.neg + '%',\n        posLabel: s.pos + '%', negLabel: s.neg + '%'\n      };\n    });\n    const positiveDiscoveryThemes = d.positiveDiscoveryThemes.map(t => ({ name: t.name, countLabel: '· ' + t.count }));\n\n    // ---------- DEEP DIVE ----------\n    const themesById = {};\n    d.discovery.themes.forEach(t => { themesById[t.id] = t; });\n    const maxTheme = d.discovery.themes[0].count;\n\n    const themes = d.discovery.themes.map(t => {\n      const isRep = t.group === 'repetition';\n      return {\n        name: t.name,\n        barWidth: (t.count / maxTheme * 100) + '%',\n        barColor: isRep ? '#1DB954' : '#30363d',\n        dotColor: isRep ? '#1DB954' : '#30363d',\n        nameColor: isRep ? '#1DB954' : '#c9d1d9',\n        nameWeight: isRep ? '600' : '400',\n        pctLabel: t.pct + '%',\n        countLabel: 'n=' + t.count\n      };\n    });\n\n    const buildBucket = (ids) => {\n      const items = ids.map(id => themesById[id]).filter(Boolean);\n      const max = Math.max(...items.map(t => t.count));\n      return items.map(t => ({\n        name: t.name,\n        barWidth: (t.count / max * 100) + '%',\n        barColor: t.group === 'repetition' ? '#1DB954' : '#f85149',\n        nameColor: t.group === 'repetition' ? '#1DB954' : '#c9d1d9',\n        nameWeight: t.group === 'repetition' ? '600' : '400',\n        pctLabel: t.pct + '%',\n        countLabel: 'n=' + t.count\n      }));\n    };\n    const findingThemes = buildBucket(d.buckets.finding.ids);\n    const recThemes = buildBucket(d.buckets.recs.ids);\n\n    // bridge\n    const br = d.bridge;\n    const chosenItems = br.chosen.items.map(i => ({ name: i.name, countLabel: 'n=' + i.count }));\n    const imposedItems = br.imposed.items.map(i => ({ name: i.name, countLabel: 'n=' + i.count }));\n\n    // behaviors / needs / segments\n    const behaviors = d.behaviors.map(b => ({ name: b.name, mentionLabel: b.mentions + '' }));\n    const unmetNeeds = d.unmetNeeds.map((n, i) => ({\n      need: n.need, rank: i + 1, mentionLabel: n.mentions + ' mentions', strength: n.strength,\n      strengthColor: n.strength === 'strong' ? '#1DB954' : n.strength === 'moderate' ? '#d29922' : '#484f58',\n      strengthBorder: n.strength === 'strong' ? 'rgba(29,185,84,0.3)' : n.strength === 'moderate' ? 'rgba(210,153,34,0.3)' : '#30363d'\n    }));\n    const segments = d.segments.map(s => ({\n      name: s.name, sizeLabel: s.size + '%', ratingLabel: s.avgRating + '★',\n      topTheme: s.topTheme, discoveryLabel: s.discoveryPct + '%',\n      baseFlag: s.size < 20 ? 'directional, low n' : '',\n      baseColor: '#d29922'\n    }));\n\n    // ---------- EVIDENCE ----------\n    const themeList = d.discovery.themes.map(t => ({\n      name: t.name, countLabel: t.count + ' reviews',\n      color: S.selectedTheme === t.id ? '#fff' : '#8b949e',\n      bg: S.selectedTheme === t.id ? 'rgba(29,185,84,0.1)' : 'transparent',\n      border: S.selectedTheme === t.id ? '1px solid rgba(29,185,84,0.25)' : '1px solid transparent',\n      weight: S.selectedTheme === t.id ? '600' : '400',\n      onClick: () => this.setState({ selectedTheme: t.id })\n    }));\n    const selTheme = themesById[S.selectedTheme];\n    const selectedThemeName = selTheme ? selTheme.name : '';\n\n    const rawQuotes = d.quotes[S.selectedTheme] || [];\n    const filtered = rawQuotes.filter(q => {\n      const sent = q.rating >= 3 ? 'pos' : 'neg';\n      if (S.evSentiment !== 'all' && sent !== S.evSentiment) return false;\n      if (S.evPlatform !== 'all' && q.platform !== S.evPlatform) return false;\n      if (S.evCountry !== 'all' && q.store !== S.evCountry) return false;\n      return true;\n    });\n    const quotes = filtered.map(q => {\n      const isPos = q.rating >= 3;\n      return {\n        text: q.text,\n        themeTag: selectedThemeName,\n        sentLabel: isPos ? 'Positive' : 'Negative',\n        sentColor: isPos ? '#1DB954' : '#f85149',\n        accent: isPos ? '#1DB954' : '#f85149',\n        starDisplay: '★'.repeat(q.rating) + '☆'.repeat(5 - q.rating),\n        starColor: q.rating <= 2 ? '#f85149' : '#d29922',\n        meta: q.platform + ' · ' + q.store\n      };\n    });\n    const quoteCountLabel = filtered.length + ' of ' + rawQuotes.length + ' quotes';\n    const noQuotes = filtered.length === 0;\n\n    const mkChips = (opts, cur, key) => opts.map(o => ({\n      label: o.label,\n      onClick: () => this.setState({ [key]: o.val }),\n      bg: cur === o.val ? 'rgba(29,185,84,0.12)' : '#0d1117',\n      color: cur === o.val ? '#1DB954' : '#8b949e',\n      border: cur === o.val ? 'rgba(29,185,84,0.3)' : '#21262d'\n    }));\n    const sentimentChips = mkChips([{ label: 'All', val: 'all' }, { label: 'Positive', val: 'pos' }, { label: 'Negative', val: 'neg' }], S.evSentiment, 'evSentiment');\n    const platformChips = mkChips([{ label: 'All', val: 'all' }, { label: 'iOS', val: 'iOS' }, { label: 'Android', val: 'Android' }], S.evPlatform, 'evPlatform');\n    const countryChips = mkChips([{ label: 'All', val: 'all' }, { label: 'US', val: 'US' }, { label: 'UK', val: 'UK' }, { label: 'CA', val: 'CA' }, { label: 'AU', val: 'AU' }], S.evCountry, 'evCountry');\n\n    // ---------- METHODOLOGY ----------\n    const funnelData = [\n      { label: 'Collected', count: d.funnel.collected, removed: null },\n      { label: 'Deduplicated', count: d.funnel.deduplicated, removed: d.funnel.collected - d.funnel.deduplicated },\n      { label: 'English only', count: d.funnel.english, removed: d.funnel.deduplicated - d.funnel.english },\n      { label: 'Substantive (A+B)', count: d.funnel.substantive, removed: d.funnel.english - d.funnel.substantive },\n      { label: 'Discovery mentions', count: d.funnel.discoveryAll, removed: d.funnel.substantive - d.funnel.discoveryAll },\n      { label: 'Deep-coded', count: d.funnel.deepCoded, removed: d.funnel.discoveryAll - d.funnel.deepCoded }\n    ];\n    const maxFunnel = funnelData[0].count;\n    const funnelSteps = funnelData.map((s, i) => ({\n      label: s.label,\n      barWidth: (s.count / maxFunnel * 100) + '%',\n      barColor: i <= 2 ? '#30363d' : i <= 3 ? '#58a6ff' : '#1DB954',\n      countLabel: s.count.toLocaleString(),\n      removedLabel: s.removed == null ? '' : '−' + s.removed.toLocaleString()\n    }));\n    const limitations = d.limitations.map(l => ({ text: l }));\n\n    // ---------- EVALUATION LAYER ----------\n    const ev = d.evaluation;\n    const maxSamp = Math.max(...ev.sampling.bars.flatMap(b => [b.collected, b.store]));\n    const samplingBars = ev.sampling.bars.map(b => ({\n      label: b.stars + '★',\n      collectedH: (b.collected / maxSamp * 100) + '%',\n      storeH: (b.store / maxSamp * 100) + '%'\n    }));\n\n    const reconcileRows = ev.funnelReconcile.map(r => ({\n      step: r.step,\n      reason: r.reason,\n      equation: r.inN == null ? (r.outN.toLocaleString() + ' (start)') : (r.inN.toLocaleString() + ' in  =  ' + r.outN.toLocaleString() + ' out  +  ' + r.removed.toLocaleString() + ' removed')\n    }));\n\n    const fieldCards = ev.fieldIntegrity.map(f => ({\n      field: f.field,\n      validLabel: f.valid + '%',\n      valColor: f.valid >= 99 ? '#1DB954' : f.valid >= 98 ? '#d29922' : '#f85149',\n      quarantinedLabel: f.quarantined === 0 ? 'none quarantined' : f.quarantined + ' quarantined'\n    }));\n\n    const falseDrop = ev.languageCheck.falseDrop + '%';\n    const falseKeep = ev.languageCheck.falseKeep + '%';\n\n    // confusion matrix\n    const cf = ev.confusion;\n    const discoIdx = cf.labels.indexOf('Discovery');\n    const confLabels = cf.labels.map((l, i) => ({\n      short: l.length > 7 ? l.slice(0, 6) + '.' : l,\n      color: i === discoIdx ? '#1DB954' : '#8b949e',\n      weight: i === discoIdx ? '700' : '400'\n    }));\n    const confRows = cf.matrix.map((row, ri) => ({\n      label: cf.labels[ri],\n      color: ri === discoIdx ? '#1DB954' : '#8b949e',\n      weight: ri === discoIdx ? '700' : '400',\n      cells: row.map((val, ci) => {\n        const diag = ri === ci;\n        const inDisco = ri === discoIdx || ci === discoIdx;\n        const alpha = diag ? Math.min(0.18 + val / 100 * 0.82, 1) : (val / 100) * 0.9 + 0.04;\n        const bg = diag\n          ? 'rgba(29,185,84,' + alpha.toFixed(2) + ')'\n          : 'rgba(248,81,73,' + ((val / 100) * 0.55 + 0.03).toFixed(2) + ')';\n        return {\n          val: val,\n          bg: bg,\n          color: diag ? (val > 40 ? '#04130a' : '#1DB954') : (val > 6 ? '#f85149' : '#484f58'),\n          ring: (inDisco && !diag) || (diag && ri === discoIdx) ? '1px solid rgba(29,185,84,0.5)' : '1px solid transparent'\n        };\n      })\n    }));\n\n    const gc = ev.goldComposition;\n    const maxGold = Math.max(...gc.coverage.map(c => c.count));\n    const goldCoverage = gc.coverage.map(c => ({\n      cat: c.cat,\n      count: c.count,\n      barWidth: (c.count / maxGold * 100) + '%',\n      barColor: c.cat === 'Discovery' ? '#1DB954' : '#30363d',\n      color: c.cat === 'Discovery' ? '#1DB954' : '#8b949e',\n      weight: c.cat === 'Discovery' ? '600' : '400'\n    }));\n\n    return {\n      navItems,\n      showOverview: S.activeSection === 'overview',\n      showDiscovery: S.activeSection === 'discovery',\n      showEvidence: S.activeSection === 'evidence',\n      showMethodology: S.activeSection === 'methodology',\n\n      // overview\n      discoveryPct: '17.5%',\n      discoveryCount: d.discovery.totalMentions,\n      substantiveCount: d.funnel.substantive.toLocaleString(),\n      effectCI: '95% CI [−1.0, −0.6]',\n      effectNote: d.effect.note,\n      delightShare: d.delight.positiveShare + '%',\n      delightCount: d.delight.positiveCount.toLocaleString(),\n      categories, ratingDist,\n      baselineWidth: (d.baseline.avgRating / 5 * 100) + '%',\n      discoveryWidth: (d.discovery.avgRating / 5 * 100) + '%',\n      trendLinePoints, trendAreaPoints, trendDots, trendLabels,\n      trendLabel: d.trendDirection.label, trendSummary: d.trendDirection.summary,\n      delightByCategory, delightThemes, sentimentSplit, positiveDiscoveryThemes,\n\n      // deep dive\n      deepCodedCount: d.discovery.deepCoded,\n      isNarrative: S.deepView === 'narrative',\n      isFrequency: S.deepView === 'frequency',\n      showNarrative: () => this.setState({ deepView: 'narrative' }),\n      showFrequency: () => this.setState({ deepView: 'frequency' }),\n      narrativeTabBg: S.deepView === 'narrative' ? '#1DB954' : 'transparent',\n      narrativeTabColor: S.deepView === 'narrative' ? '#04130a' : '#8b949e',\n      frequencyTabBg: S.deepView === 'frequency' ? '#1DB954' : 'transparent',\n      frequencyTabColor: S.deepView === 'frequency' ? '#04130a' : '#8b949e',\n      behaviors, themes, findingThemes, recThemes,\n      findingEmerging: d.buckets.finding.emerging,\n      recEmerging: d.buckets.recs.emerging,\n      bridgeTotal: br.total,\n      chosenTotal: br.chosen.total, chosenLabel: br.chosen.label, chosenSub: br.chosen.sub, chosenFlow: br.chosen.flowsTo, chosenItems,\n      imposedTotal: br.imposed.total, imposedLabel: br.imposed.label, imposedSub: br.imposed.sub, imposedFlow: br.imposed.flowsTo, imposedItems,\n      unmetNeeds, segments,\n\n      // evidence\n      themeList, selectedThemeName, quotes, quoteCountLabel, noQuotes,\n      sentimentChips, platformChips, countryChips,\n\n      // methodology\n      funnelSteps, limitations,\n      windowJustification: d.window.justification,\n      toggleEval: () => this.setState({ evalOpen: !S.evalOpen }),\n      evalOpen: S.evalOpen,\n      evalChevron: S.evalOpen ? '▲' : '▼',\n      evalHint: S.evalOpen ? 'The seven quality checks, below.' : 'Opens the evaluation layer — seven checks you can see, not take on trust.',\n\n      // evaluation\n      samplingBars, samplingNote: ev.sampling.note,\n      reconcileRows,\n      fieldCards,\n      falseDrop, falseKeep,\n      langExample: ev.languageCheck.example, langVerdict: ev.languageCheck.exampleVerdict,\n      confLabels, confRows, discoveryAccuracy: cf.discoveryAccuracy + '%',\n      goldTotal: gc.total, borderlineCount: gc.borderline, easyCount: gc.easy,\n      borderlineWidth: (gc.borderline / gc.total * 100) + '%',\n      easyWidth: (gc.easy / gc.total * 100) + '%',\n      goldCoverage,\n      confidentShare: ev.abstention.confidentShare + '%', confidentAccuracy: ev.abstention.confidentAccuracy + '%',\n      abstainedShare: ev.abstention.abstainedShare + '%', abstainedAccuracy: ev.abstention.abstainedAccuracy + '%'\n    };\n  }\n\n  emptyState() {\n    return {\n      navItems: [], showOverview: true, showDiscovery: false, showEvidence: false, showMethodology: false,\n      discoveryPct: '—', discoveryCount: '—', substantiveCount: '—', effectCI: '', effectNote: '',\n      delightShare: '—', delightCount: '—', categories: [], ratingDist: [],\n      baselineWidth: '0%', discoveryWidth: '0%',\n      trendLinePoints: '', trendAreaPoints: '', trendDots: [], trendLabels: [], trendLabel: '', trendSummary: '',\n      delightByCategory: [], delightThemes: [], sentimentSplit: [], positiveDiscoveryThemes: [],\n      deepCodedCount: '—', isNarrative: true, isFrequency: false,\n      showNarrative: () => {}, showFrequency: () => {},\n      narrativeTabBg: '#1DB954', narrativeTabColor: '#04130a', frequencyTabBg: 'transparent', frequencyTabColor: '#8b949e',\n      behaviors: [], themes: [], findingThemes: [], recThemes: [], findingEmerging: 0, recEmerging: 0,\n      bridgeTotal: 0, chosenTotal: 0, chosenLabel: '', chosenSub: '', chosenFlow: '', chosenItems: [],\n      imposedTotal: 0, imposedLabel: '', imposedSub: '', imposedFlow: '', imposedItems: [],\n      unmetNeeds: [], segments: [],\n      themeList: [], selectedThemeName: '', quotes: [], quoteCountLabel: '', noQuotes: false,\n      sentimentChips: [], platformChips: [], countryChips: [],\n      funnelSteps: [], limitations: [], windowJustification: '',\n      toggleEval: () => {}, evalOpen: false, evalChevron: '▼', evalHint: '',\n      samplingBars: [], samplingNote: '', reconcileRows: [], fieldCards: [], falseDrop: '', falseKeep: '',\n      langExample: '', langVerdict: '', confLabels: [], confRows: [], discoveryAccuracy: '',\n      goldTotal: 0, borderlineCount: 0, easyCount: 0, borderlineWidth: '0%', easyWidth: '0%', goldCoverage: [],\n      confidentShare: '', confidentAccuracy: '', abstainedShare: '', abstainedAccuracy: ''\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
